name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            numpy scipy pyqtgraph tomlkit \
            PyQt5 PyQt5-sip \
            coverage
          pip install git+https://github.com/davidgrier/QVideo.git
          pip install -e .

      - name: Run tests with coverage
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          cd ..
          coverage run -m unittest discover -s QFab/tests -q
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
